name: 🚀 Déploiement du site

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy.yml'

jobs:
  verification-et-mise-en-ligne:
    name: 🔍 Vérifier & 🌐 Mettre en ligne
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: ⚙️ Préparer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: 📦 Installer les dépendances
        run: npm ci

      - name: 🧹 Vérifier la qualité du code
        run: npm run lint

      - name: 🧪 Lancer les tests
        run: npm run test

      - name: 🏗️ Construire le site
        run: npm run build

      - name: 🌐 Publier sur Netlify
        run: npx netlify-cli deploy --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
